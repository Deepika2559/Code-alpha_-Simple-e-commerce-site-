<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple E-Commerce Store</title>
    
<style>
    body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #f5f5f5;
}

header {
    background: #333;
    color: white;
    padding: 15px 30px;
    display: flex;
    justify-content: space-between;
}

header button {
    padding: 10px;
    cursor: pointer;
}

.products {
    display: flex;
    justify-content: center;
    gap: 20px;
    padding: 30px;
    flex-wrap: wrap;
}

.product {
    background: white;
    padding: 20px;
    border-radius: 10px;
    width: 250px;
    text-align: center;
    box-shadow: 0 0 10px gray;
}
.dark-mode {
    background: #1a1a1a;
    color: white;
}

.dark-mode .product,
.dark-mode .cart-section {
    background: #333;
    color: white;
}

.dark-mode header {
    background: #000;
}

.product img {
    width: 100%;
}

.product button {
    background: green;
    color: white;
    border: none;
    padding: 10px;
    cursor: pointer;
}

.cart-box {
    background: white;
    margin: 20px;
    padding: 20px;
    border-radius: 10px;
    display: none;
}
</style>    
</head>
<body>

    <header>
        <h1>🛒 My E-Commerce Store</h1>
        <button onclick="showCart()">
            Cart (<span id="cart-count">0</span>)
        </button>
        <button onclick="toggleTheme()" id="themeBtn">
    🌙 Dark Mode
</button>
    </header>

    <section class="products">

        <div class="product">
            <img src="https://via.placeholder.com/200" alt="Product">
            <h3>Wireless Headphones</h3>
            <p>₹1500</p>
            <button onclick="addToCart('Wireless Headphones',1500)">Add to Cart</button>
        </div>

        <div class="product">
            <img src="https://via.placeholder.com/200" alt="Product">
            <h3>Smart Watch</h3>
            <p>₹2500</p>
            <button onclick="addToCart('Smart Watch',2500)">Add to Cart</button>
        </div>

        <div class="product">
            <img src="https://via.placeholder.com/200" alt="Product">
            <h3>Bluetooth Speaker</h3>
            <p>₹1800</p>
            <button onclick="addToCart('Bluetooth Speaker',1800)">Add to Cart</button>
        </div>

    <div class="product">
        <img src="https://via.placeholder.com/250" alt="">
        <h3>Laptop Backpack</h3>
        <p>₹1200</p>
        <button onclick="addToCart('Laptop Backpack',1200)">
            Add to Cart
        </button>
    </div>

    <!-- Add new product here -->
    <div class="product">
        <img src="https://via.placeholder.com/250" alt="">
        <h3>Gaming Mouse</h3>
        <p>₹999</p>
        <button onclick="addToCart('Gaming Mouse',999)">
            Add to Cart
        </button>
    </div>



    </section>

    <div class="cart-box" id="cart-box">
        <h2>Shopping Cart</h2>
        <ul id="cart-items"></ul>
        <h3>Total: ₹<span id="total">0</span></h3>
        <button onclick="checkout()">Place Order</button>
    </div>

<script>
    let cart = [];
let total = 0;

function addToCart(name, price) {
    cart.push({ name, price });
    total += price;

    document.getElementById("cart-count").innerText = cart.length;

    alert(name + " added to cart!");
}

function showCart() {

    let cartItems = document.getElementById("cart-items");
    cartItems.innerHTML = "";

    cart.forEach(item => {
        let li = document.createElement("li");
        li.innerText = `${item.name} - ₹${item.price}`;
        cartItems.appendChild(li);
    });

    document.getElementById("total").innerText = total;
    document.getElementById("cart-box").style.display = "block";
}

function checkout() {

    if (cart.length === 0) {
        alert("Cart is empty!");
        return;
    }

    alert("Order Placed Successfully!");

    cart = [];
    total = 0;

    document.getElementById("cart-count").innerText = 0;
    document.getElementById("cart-items").innerHTML = "";
    document.getElementById("total").innerText = 0;
}
function toggleTheme() {

    document.body.classList.toggle("dark-mode");

    let btn = document.getElementById("themeBtn");

    if (document.body.classList.contains("dark-mode")) {
        btn.innerText = "☀️ Light Mode";
    } else {
        btn.innerText = "🌙 Dark Mode";
    }
}
</script>    

</body>
</html>
